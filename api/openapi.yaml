  # ── Alerts ────────────────────────────────────────────
  /v1/alerts/rules:
    get:
      tags: [alerts]
      summary: List alert rules
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Alert rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/AlertRule' } }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    post:
      tags: [alerts]
      summary: Create an alert rule
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AlertRuleCreate' }
      responses:
        '201':
          description: Alert rule created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AlertRule' }
        '400': { description: Invalid request body, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '409': { description: Rule name already exists, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /v1/alerts/rules/{id}:
    put:
      tags: [alerts]
      summary: Update an alert rule
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AlertRuleUpdate' }
      responses:
        '200':
          description: Updated alert rule
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AlertRule' }
        '400': { description: Invalid request body, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '404': { description: Rule not found, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    delete:
      tags: [alerts]
      summary: Delete an alert rule
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '404': { description: Rule not found, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /v1/alerts/rules/{id}/test:
    post:
      tags: [alerts]
      summary: Dry-run evaluate an alert rule against current data
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Dry-run result
          content:
            application/json:
              schema:
                type: object
                required: [would_fire, metric_value]
                properties:
                  would_fire:   { type: boolean }
                  metric_value: { type: number }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '404': { description: Rule not found, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /v1/alerts:
    get:
      tags: [alerts]
      summary: List fired alerts
      security:
        - BearerAuth: []
      parameters:
        - name: severity
          in: query
          schema: { type: string, enum: [info, warning, high, critical] }
        - name: status
          in: query
          schema: { type: string, enum: [open, acknowledged, resolved] }
          description: Filter by alert status.
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, default: 25, maximum: 100 }
      responses:
        '200':
          description: Alert list
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Alert' } }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /v1/alerts/{id}/acknowledge:
    post:
      tags: [alerts]
      summary: Acknowledge a fired alert
      description: Sets status=acknowledged and records acknowledged_by from the JWT subject.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Updated alert
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Alert' }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '404': { description: Alert not found, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '409': { description: Alert already resolved, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /v1/alerts/{id}/resolve:
    post:
      tags: [alerts]
      summary: Resolve a fired alert
      description: Sets status=resolved and resolved_at to now.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Updated alert
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Alert' }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '404': { description: Alert not found, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '409': { description: Alert already resolved, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  # ── Settings: Org ─────────────────────────────────────
  /v1/settings/org:
