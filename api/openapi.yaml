        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    put:
      tags: [settings]
      summary: Update organisation settings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrgSettingsUpdate' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrgSettings' }
        '400': { description: Invalid request body, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  # ── Settings: Notifications ────────────────────────────
  /v1/settings/notifications:
    get:
      tags: [settings]
      summary: Get notification configuration
      description: Returns notification config. slack_webhook_url is masked — only the first 8 characters are returned.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Notification config
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationConfig' }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    put:
      tags: [settings]
      summary: Update notification configuration (merge-patch)
      description: Merges supplied fields into the existing config. Omitted fields are unchanged.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotificationConfig' }
      responses:
        '200':
          description: Updated notification config (webhook URL masked)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationConfig' }
        '400': { description: Invalid request body, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /v1/settings/notifications/test:
    post:
      tags: [settings]
      summary: Send a test notification
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel]
              properties:
                channel:   { type: string, enum: [slack, email] }
                recipient: { type: string, description: "Email address for channel=email. Ignored for channel=slack." }
      responses:
        '200':
          description: Test notification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  error:   { type: string, nullable: true }
        '400': { description: Invalid request body, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  # ── Users ─────────────────────────────────────────────
  /v1/users:
    get:
      tags: [users]
      summary: List users in the organisation
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, default: 25, maximum: 100 }
        - name: include_deleted
          in: query
          schema: { type: boolean, default: false }
          description: Include soft-deleted users.
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/OrgUser' } }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /v1/users/invite:
    post:
      tags: [users]
      summary: Invite a user to the organisation
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email: { type: string, format: email }
                role:  { type: string, enum: [admin, operator, approver, viewer] }
      responses:
        '201':
          description: Invite created
          content:
            application/json:
              schema:
                type: object
                required: [invite_link]
                properties:
                  invite_link: { type: string, description: "Single-use invitation URL. Expires after 72 hours." }
        '400': { description: Invalid request body, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '409': { description: User already exists, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /v1/users/{userId}/role:
    put:
      tags: [users]
      summary: Change a user's role
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [admin, operator, approver, viewer] }
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrgUser' }
        '400': { description: Invalid role, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '404': { description: User not found, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /v1/users/{userId}:
    delete:
      tags: [users]
      summary: Soft-delete a user
      description: Sets deleted_at on the user record. The user can no longer log in but their audit history is preserved.
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: User soft-deleted }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '404': { description: User not found, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  # ── Discover ──────────────────────────────────────────
  /v1/discover/endpoints:
    get:
      tags: [discover]
      summary: List discovered endpoints
      description: Returns all network-observed API endpoints for the authenticated org, written by the collector forwarder via POST /v1/reports.
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, default: 25, maximum: 100 }
        - name: host
          in: query
          schema: { type: string }
          description: Filter by destination host
        - name: source_host
          in: query
          schema: { type: string }
          description: Filter by reporting agent hostname
        - name: method
          in: query
          schema: { type: string, enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS] }
        - name: tag
          in: query
          schema: { type: string }
          description: Filter by tag (e.g. llm, openai)
      responses:
        '200':
          description: Paginated list of discovered endpoints
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/DiscoveredEndpoint' }
                  meta:
                    type: object
                    required: [total, page, per_page]
                    properties:
                      total:    { type: integer }
                      page:     { type: integer }
                      per_page: { type: integer }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /v1/discover/endpoints/{endpointId}:
    get:
      tags: [discover]
      summary: Get a discovered endpoint
      security:
        - BearerAuth: []
      parameters:
        - name: endpointId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Discovered endpoint record
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DiscoveredEndpoint' }
        '401': { description: Unauthorized, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Forbidden, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '404': { description: Endpoint not found, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  # ── Collector Ingest ───────────────────────────────────
  /v1/reports:
    post:
      tags: [ingest]
      summary: Submit a collector report (service API key)
      description: |
        Internal endpoint used by the on-prem collector forwarder to submit
        network-observed endpoint data. Requires a service API key in the
        X-Service-Key header — not a user JWT. Upserts rows in discovered_endpoints
        keyed on (org_id, source_host, method, host, path).
      security:
        - ServiceKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_host, endpoints]
              properties:
                source_host:
                  type: string
                  description: Hostname or IP of the reporting agent
                endpoints:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items:
                    type: object
                    required: [method, path, host]
                    properties:
                      method:      { type: string, enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS] }
                      path:        { type: string, example: /api/v2/completions }
                      host:        { type: string }
                      port:        { type: integer }
                      tls:         { type: boolean, default: false }
                      hit_count:   { type: integer, minimum: 1, default: 1 }
                      tags:        { type: array, items: { type: string } }
                      raw_headers: { type: object, description: "Sampled headers — strip auth values before sending." }
      responses:
        '200':
          description: Report accepted
          content:
            application/json:
              schema:
                type: object
                required: [upserted, errors]
                properties:
                  upserted: { type: integer, description: "Rows created or updated" }
                  errors:   { type: array, items: { type: string } }
        '400': { description: Invalid request body, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { description: Missing or invalid X-Service-Key, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403': { description: Service key not authorised for this org, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '409': { description: Conflict, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '500': { description: Internal server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
