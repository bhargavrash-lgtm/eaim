server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA catch-all: unknown paths serve index.html so React Router handles routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressively cache fingerprinted static assets (JS, CSS, fonts, images).
    # Vite adds a content hash to filenames (e.g. index.a1b2c3d4.js), so
    # Cache-Control: immutable is safe — the filename changes on every rebuild.
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html — it contains the hashed asset references.
    # Browsers must always fetch a fresh copy so they pick up new deploys.
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"            always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression for text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
